<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

```
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: #f4f6f9;
    }

    .main-card {
        max-width: 720px;
        margin: 60px auto;
        background: #ffffff;
        padding: 35px;
        border-radius: 15px;
        border: 1px solid #e0e0e0;
    }

    .title {
        font-weight: 600;
        color: #222;
    }

    .subtitle {
        font-size: 14px;
        color: #6c757d;
    }

    textarea {
        resize: none;
        border-radius: 8px;
    }

    textarea:focus {
        box-shadow: none;
        border-color: #0d6efd;
    }

    .btn-custom {
        background-color: #0d6efd;
        border: none;
        padding: 10px 35px;
        border-radius: 25px;
        color: white;
        font-weight: 500;
    }

    .btn-custom:hover {
        background-color: #0b5ed7;
    }

    .result-box {
        margin-top: 25px;
        padding: 15px;
        border-radius: 8px;
        font-weight: 500;
    }

    .banner-img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #888;
    }
</style>
```

</head>

<body>

<div class="main-card">

```
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0wvj2caokPnNWS6WOvcxabzYzGuCkFTWEyA&s"
     class="banner-img"
     alt="Fake News">

<h2 class="text-center title mb-2">📰 Fake News Detector</h2>
<p class="text-center subtitle mb-4">
    Identify whether a news article is real or fake using AI
</p>

<form method="POST" action="/predict">

    <div class="mb-3">
        <label class="form-label">News Content</label>
        <textarea
            class="form-control"
            name="news"
            rows="6"
            placeholder="Paste your news article here..."
            required></textarea>
    </div>

    <div class="text-center">
        <button type="submit" class="btn btn-custom">
            Analyze
        </button>
    </div>

</form>

{% if prediction_text %}
    <div class="result-box text-center 
        {% if 'Fake' in prediction_text %}
            bg-danger text-white
        {% else %}
            bg-success text-white
        {% endif %}
    ">
        {{ prediction_text }}
    </div>
{% endif %}

<div class="footer-text">
    Machine Learning Project • Flask
</div>
```

</div>

</body>
</html>
